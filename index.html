<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SB - Allround DJ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        /* Logo Header */
        .logo-header {
            width: 160px;
            margin-bottom: 25px;
            transition: transform 0.3s ease;
        }

        .logo-header:hover {
            transform: scale(1.05);
        }

        /* Presspic styling */
        .presspic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            object-position: top center;
            border: 2px solid #ffffff;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 14px;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 35px;
        }

        /* Links / Buttons */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            background-color: #ffffff;
            color: #000000;
        }

        /* Officiële Social Icoontjes aan de linkerkant */
        .btn-icon {
            position: absolute;
            left: 20px;
            font-size: 20px;
        }

        /* Info & Bookings Section */
        .info-section {
            border-top: 1px solid #333333;
            padding-top: 30px;
            margin-top: 20px;
        }

        .info-section h2 {
            font-size: 18px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .info-section p {
            font-size: 14px;
            color: #cccccc;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .email-btn {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.3s ease;
        }

        .email-btn:hover {
            background-color: #cccccc;
        }

        .footer {
            margin-top: 50px;
            font-size: 11px;
            color: #555555;
        }
    </style>
</head>
<body>

    <div class="container">
        


        <img src="IMG_3727.JPG" alt="SB Presspic" class="presspic">
<br>
            <img src="Logo white.png" alt="SB Logo" class="logo-header">
        
        <div class="subtitle">Allround DJ</div>

        <div class="links-container">
            
            <a href="https://www.instagram.com/sbmusicbe" target="_blank" class="link-btn">
                <i class="fab fa-instagram btn-icon"></i>
                Instagram
            </a>

            <a href="https://www.tiktok.com/@sbmusicbe" target="_blank" class="link-btn">
                <i class="fab fa-tiktok btn-icon"></i>
                TikTok
            </a>

            <a href="https://www.soundcloud.com/sbmusicbe" target="_blank" class="link-btn">
                <i class="fab fa-soundcloud btn-icon"></i>
                SoundCloud
            </a>

            <a href="https://www.facebook.com/sbmusicbe" target="_blank" class="link-btn">
                <i class="fab fa-facebook-f btn-icon"></i>
                Facebook
            </a>

        </div>

        <div class="info-section">
            <h2>Boekingen & Info</h2>
